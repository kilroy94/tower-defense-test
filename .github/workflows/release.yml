name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish. Defaults to the current ref name."
        required: false
        type: string
      export_preset:
        description: "Existing Godot Windows export preset name."
        required: false
        default: "Windows Desktop"
        type: string

permissions:
  contents: write

env:
  EXPORT_PRESET: ${{ inputs.export_preset || 'Windows Desktop' }}
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
  GODOT_EXECUTABLE_URL: "https://github.com/godotengine/godot-builds/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_linux_x86_64.zip"
  GODOT_TEMPLATES_URL: "https://github.com/godotengine/godot-builds/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_export_templates.tpz"

jobs:
  windows-release:
    name: Windows release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Windows export preset exists
        shell: bash
        run: |
          if ! grep -q 'platform="Windows Desktop"' export_presets.cfg; then
            echo "::error::No Windows Desktop export preset found in export_presets.cfg."
            exit 1
          fi

          if ! grep -q "name=\"${EXPORT_PRESET}\"" export_presets.cfg; then
            echo "::error::Export preset '${EXPORT_PRESET}' was not found in export_presets.cfg."
            exit 1
          fi

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Export Windows release
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: ${{ env.GODOT_EXECUTABLE_URL }}
          godot_export_templates_download_url: ${{ env.GODOT_TEMPLATES_URL }}
          relative_project_path: ./
          presets_to_export: ${{ env.EXPORT_PRESET }}
          archive_output: true
          archive_root_folder: true
          cache: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: ${{ steps.export.outputs.archive_directory }}/*
          fail_on_unmatched_files: true
          generate_release_notes: true
